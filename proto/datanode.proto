syntax = "proto3";
package minitfs;

message WriteBlockRequest {
    uint64 block_id = 1;
    uint64 file_id  = 2;
    bytes  data     = 3;
    bool   is_last  = 4;
}
message WriteBlockResponse {
    int32  status  = 1;
    string message = 2;
    int64  offset  = 3;
    int64  size    = 4;
    uint32 crc32   = 5;  // DataNode 计算的整体 CRC32
}

message ReadBlockRequest {
    uint64 block_id = 1;
    uint64 file_id  = 2;
    int64  offset   = 3;
    int64  size     = 4;
}
message ReadBlockResponse {
    int32  status  = 1;
    string message = 2;
    bytes  data    = 3;
    uint32 crc32   = 4;  // 最后一个 chunk 携带整体 CRC32
}

message DeleteBlockRequest {
    uint64 block_id = 1;
    uint64 file_id  = 2;
}
message DeleteBlockResponse {
    int32  status  = 1;
    string message = 2;
}

message CopyBlockRequest {
    uint64 block_id            = 1;
    uint64 file_id             = 2;
    string source_datanode_ip  = 3;
    int32  source_datanode_port = 4;
    int64  source_offset       = 5;
    int64  source_size         = 6;
}
message CopyBlockResponse {
    int32  status  = 1;
    string message = 2;
    int64  offset  = 3;
    int64  size    = 4;
    uint32 crc32   = 5;
}

service DataNodeService {
    rpc WriteBlock  (stream WriteBlockRequest) returns (WriteBlockResponse);
    rpc ReadBlock   (ReadBlockRequest)         returns (stream ReadBlockResponse);
    rpc DeleteBlock (DeleteBlockRequest)       returns (DeleteBlockResponse);
    rpc CopyBlock   (CopyBlockRequest)         returns (CopyBlockResponse);
}
